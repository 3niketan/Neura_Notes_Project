{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}AI Notes{% endblock %}</title>


    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    {% block css %}

    <!-- {{ block.super }}

    <link rel="stylesheet" href="{% static 'NeuraNotes/Css/style.css' %}"> -->

    <style>
      body {
        margin: 0;
      }
      .app-navbar {
        background-color: #0f172b;
        padding: 0;
        margin: 0;
      }
      .app-navbar-inner {
        background-color: #0f172b;
        padding: 4px 12px;
      }
      .main-content {
        padding-top: 0;
      }
      #img {
        height: 60px;
        width: 60px;
        object-fit: cover;
        border-radius: 50px;
      }
      #a {
        text-decoration: none;
      }
      .ms-2 {
        font-size: 25px;
        color: white;
        font-weight: bolder;
      }
      .nav-auth-link {
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
      .nav-auth-link:hover {
        color: white;
      }
    </style>

    {% endblock %}

  </head>
  <body>
    <nav class="navbar app-navbar">
      <div class="container-fluid app-navbar-inner">
        <a class="d-flex" id="a" href="{% url 'dashboard' %}"
          ><img
            id="img"
            src="{% static 'NeuraNotes/Images/ChatGPT Image Mar 27, 2026, 08_24_37 PM.png' %}"
            alt=""
          />
          <h4 class="ms-2 mt-3">NEURA NOTES</h4>
        </a>

        <form class="d-flex" action="{% url 'login' %}" method="get">
          {% if user.is_authenticated %}
          <button class="btn btn-outline-dark bg-primary" type="submit">
            <a class="nav-auth-link" href="{% url 'logout' %}">Logout</a>
          </button>
          {% else %}
          <button class="btn btn-outline-dark bg-primary" type="submit"> 
            <a class="nav-auth-link" href="{% url 'login' %}">Login</a> 
          </button>
          {% endif %}
        </form>
      </div>
    </nav>

    <main class="main-content">
      {% block content %} 

      {% endblock %}
    </main>

    <footer>
      <div style="margin-top: 120px">
        <h5
          style="color: #cfd7fc; text-align: center; font-size: 20px"
          class="p-5"
        >
          Made With ❤️ By Me
        </h5>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
